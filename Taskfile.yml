version: "3"

vars:
  STOW_DIR: "{{.ROOT_DIR}}"
  TARGET: "{{.HOME}}"

tasks:
  setup:
    desc: Install all tools
    cmds:
      - task: setup:fonts
      - task: setup:karabiner
      - task: setup:ghostty
      - task: setup:alacritty
      - task: setup:starship
      - task: setup:fzf
      - task: setup:yazi
      - task: setup:yazi-theme
      - task: setup:tmux
      - task: setup:node
      - task: setup:fd
      - task: setup:ripgrep
      - task: setup:tree-sitter
      - task: setup:gcloud
      - task: setup:uv
      - task: setup:go
      - task: setup:nvim

  stow:
    desc: Link all packages
    cmds:
      - task: stow:ghostty
      - task: stow:alacritty
      - task: stow:karabiner
      - task: stow:ssh
      - task: stow:git
      - task: stow:zsh
      - task: stow:starship
      - task: stow:yazi
      - task: stow:tmux
      - task: stow:nvim

  unstow:
    desc: Unlink all packages
    cmds:
      - task: unstow:ghostty
      - task: unstow:alacritty
      - task: unstow:karabiner
      - task: unstow:ssh
      - task: unstow:git
      - task: unstow:zsh
      - task: unstow:starship
      - task: unstow:yazi
      - task: unstow:tmux
      - task: unstow:nvim

  setup:fonts:
    desc: Install required fonts
    cmds:
      - brew install --cask font-ubuntu-mono-nerd-font
    status:
      - test -f ~/Library/Fonts/UbuntuMonoNerdFont-Regular.ttf

  setup:karabiner:
    desc: Install Karabiner-Elements
    cmds:
      - brew install --cask karabiner-elements
    status:
      - test -d /Applications/Karabiner-Elements.app

  stow:karabiner:
    desc: Link Karabiner config
    deps: [setup:karabiner]
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} karabiner

  unstow:karabiner:
    desc: Unlink Karabiner config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} karabiner

  stow:ssh:
    desc: Link ssh config
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} ssh

  unstow:ssh:
    desc: Unlink ssh config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} ssh

  stow:git:
    desc: Link git config
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} git

  unstow:git:
    desc: Unlink git config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} git

  setup:ghostty:
    desc: Install ghostty terminal
    cmds:
      - brew install --cask ghostty
    status:
      - test -d /Applications/Ghostty.app

  stow:ghostty:
    desc: Link ghostty config
    deps: [setup:ghostty, setup:fonts]
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} ghostty

  unstow:ghostty:
    desc: Unlink ghostty config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} ghostty

  setup:alacritty:
    desc: Install alacritty
    cmds:
      - brew install --cask alacritty
    status:
      - test -d /Applications/Alacritty.app

  stow:alacritty:
    desc: Link alacritty config
    deps: [setup:alacritty, setup:fonts]
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} alacritty

  unstow:alacritty:
    desc: Unlink alacritty config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} alacritty

  setup:starship:
    desc: Install starship prompt
    cmds:
      - brew install starship
    status:
      - command -v starship

  setup:fzf:
    desc: Install fzf
    cmds:
      - brew install fzf
    status:
      - command -v fzf

  stow:zsh:
    desc: Link zsh config
    deps: [setup:starship, setup:fzf]
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} zsh

  unstow:zsh:
    desc: Unlink zsh config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} zsh

  stow:starship:
    desc: Link starship config
    deps: [setup:starship]
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} starship

  unstow:starship:
    desc: Unlink starship config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} starship

  setup:yazi:
    desc: Install yazi file manager
    cmds:
      - brew install yazi
    status:
      - command -v yazi

  setup:yazi-theme:
    desc: Install yazi gruvbox-material theme
    deps: [setup:yazi]
    cmds:
      - ya pkg add matt-dong-123/gruvbox-material
    status:
      - grep -q "gruvbox-material" ~/.config/yazi/package.toml

  stow:yazi:
    desc: Link yazi config
    deps: [setup:yazi, setup:yazi-theme]
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} yazi

  unstow:yazi:
    desc: Unlink yazi config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} yazi

  setup:tmux:
    desc: Install tmux
    cmds:
      - brew install tmux
    status:
      - command -v tmux

  stow:tmux:
    desc: Link tmux config
    deps: [setup:tmux]
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} tmux

  unstow:tmux:
    desc: Unlink tmux config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} tmux

  setup:node:
    desc: Install node (for LSP servers)
    cmds:
      - brew install node
    status:
      - command -v node

  setup:fd:
    desc: Install fd (for telescope)
    cmds:
      - brew install fd
    status:
      - command -v fd

  setup:ripgrep:
    desc: Install ripgrep (for live-grep)
    cmds:
      - brew install ripgrep
    status:
      - command -v rg

  setup:tree-sitter:
    desc: Install tree-sitter-cli (for treesitter)
    cmds:
      - brew install tree-sitter-cli
    status:
      - command -v tree-sitter

  setup:gcloud:
    desc: Install Google Cloud SDK
    cmds:
      - brew install --cask google-cloud-sdk
    status:
      - command -v gcloud

  setup:uv:
    desc: Install uv (Python package manager)
    cmds:
      - brew install uv
    status:
      - command -v uv

  setup:go:
    desc: Install Go (for Mason Go-based LSP servers)
    cmds:
      - brew install go
    status:
      - command -v go

  setup:nvim:
    desc: Install neovim
    cmds:
      - brew install neovim
    status:
      - command -v nvim

  stow:nvim:
    desc: Link nvim config
    deps: [setup:nvim, setup:fonts, setup:node, setup:fd, setup:ripgrep, setup:tree-sitter, setup:go]
    cmds:
      - stow -v -d {{.STOW_DIR}} -t {{.TARGET}} nvim

  unstow:nvim:
    desc: Unlink nvim config
    cmds:
      - stow -v -D -d {{.STOW_DIR}} -t {{.TARGET}} nvim
