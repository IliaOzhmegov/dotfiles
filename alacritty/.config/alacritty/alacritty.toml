# Alacritty config — updated 2026-04-22

[env]
TERM = "xterm-256color"

[window]
decorations = "Full"
startup_mode = "SimpleFullscreen"
opacity = 0.95

[window.padding]
x = 10
y = 10

[window.dimensions]
columns = 280
lines = 60

[cursor.style]
shape = "Block"
blinking = "On"

[font]
size = 16.0
builtin_box_drawing = true

[font.normal]
family = "UbuntuMono Nerd Font"
style = "Regular"

[font.bold]
family = "UbuntuMono Nerd Font"
style = "Bold"

[font.italic]
family = "UbuntuMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "UbuntuMono Nerd Font"
style = "Bold Italic"

# Colors (Gruvbox Material)
[colors.primary]
background = "#282828"
foreground = "#d4be98"

[colors.cursor]
text = "#282828"
cursor = "#d4be98"

[colors.normal]
black   = "#665c54"
red     = "#ea6962"
green   = "#a9b665"
yellow  = "#d8a657"
blue    = "#7daea3"
magenta = "#d3869b"
cyan    = "#89b482"
white   = "#d4be98"

[colors.bright]
black   = "#928374"
red     = "#ea6962"
green   = "#a9b665"
yellow  = "#d8a657"
blue    = "#7daea3"
magenta = "#d3869b"
cyan    = "#89b482"
white   = "#d4be98"
